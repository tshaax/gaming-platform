services:
  postgres:
    image: postgres:16-alpine
    container_name: gaming_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaming
      POSTGRES_PASSWORD: gaming
      POSTGRES_DB: gaming_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gaming_platform_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gaming.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
